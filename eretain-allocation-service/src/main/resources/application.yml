server:
  port: 8084

spring:
  application:
    name: eretain-allocation-service
  datasource:
    url: jdbc:postgresql://localhost:5432/eretain_allocation
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

jwt:
  secret: eRetainSecretKeyForJWTTokenGenerationMustBe256BitsLong!!

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.eretain: DEBUG
