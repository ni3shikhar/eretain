<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main}">
<head><title>User Management - eRetain</title></head>
<body>
    <div layout:fragment="content">
        <div class="page-header">
            <h2><i class="fas fa-users-cog me-2"></i>User Management</h2>
            <a th:href="@{/admin/users/new}" class="btn btn-primary">
                <i class="fas fa-plus me-1"></i>New User
            </a>
        </div>

        <!-- Filter Bar -->
        <div class="filter-bar" th:if="${users != null and !users.isEmpty()}">
            <div class="row g-2">
                <div class="col-md-2">
                    <label>Username</label>
                    <input type="text" class="form-control" data-filter-col="1" placeholder="Search username...">
                </div>
                <div class="col-md-2">
                    <label>Name</label>
                    <input type="text" class="form-control" data-filter-col="2" placeholder="Search name...">
                </div>
                <div class="col-md-2">
                    <label>Email</label>
                    <input type="text" class="form-control" data-filter-col="3" placeholder="Search email...">
                </div>
                <div class="col-md-2">
                    <label>Role</label>
                    <select class="form-select" data-filter-col="6">
                        <option value="">All Roles</option>
                        <option value="ADMINISTRATOR">ADMINISTRATOR</option>
                        <option value="PMO">PMO</option>
                        <option value="PROJECT_MANAGER">PROJECT_MANAGER</option>
                        <option value="TEAM_LEAD">TEAM_LEAD</option>
                        <option value="EMPLOYEE">EMPLOYEE</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <label>Status</label>
                    <select class="form-select" data-filter-col="7">
                        <option value="">All</option>
                        <option value="active">Active</option>
                        <option value="inactive">Inactive</option>
                    </select>
                </div>
                <div class="col-md-2 d-flex align-items-end gap-2">
                    <button type="button" class="btn btn-clear"><i class="fas fa-times me-1"></i>Clear</button>
                </div>
            </div>
            <div id="filter-count" class="filter-count"></div>
        </div>

        <div class="card">
            <div class="card-body p-0">
                <table class="table table-hover" th:if="${users != null and !users.isEmpty()}">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Username</th>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Employee ID</th>
                            <th>Designation</th>
                            <th>Roles</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="u, iterStat : ${users}">
                            <td th:text="${currentPage * 10 + iterStat.count}">1</td>
                            <td>
                                <a th:href="@{/admin/users/{id}(id=${u['id']})}" th:text="${u['username']}">admin</a>
                            </td>
                            <td th:text="${(u['firstName'] != null ? u['firstName'] : '') + ' ' + (u['lastName'] != null ? u['lastName'] : '')}">John Doe</td>
                            <td th:text="${u['email']}">admin@example.com</td>
                            <td th:text="${u['employeeId']}">EMP001</td>
                            <td th:text="${u['designation']}">Manager</td>
                            <td>
                                <span th:each="role : ${u['roles']}" class="badge bg-info me-1" th:text="${role}">ADMIN</span>
                            </td>
                            <td>
                                <span class="badge"
                                      th:classappend="${u['active'] == true ? 'bg-success' : 'bg-danger'}"
                                      th:text="${u['active'] == true ? 'Active' : 'Inactive'}">Active</span>
                            </td>
                            <td class="action-btns">
                                <a th:href="@{/admin/users/{id}(id=${u['id']})}"
                                   class="btn btn-sm btn-outline-info" title="View">
                                    <i class="fas fa-eye"></i>
                                </a>
                                <a th:href="@{/admin/users/{id}/edit(id=${u['id']})}"
                                   class="btn btn-sm btn-outline-primary" title="Edit">
                                    <i class="fas fa-edit"></i>
                                </a>
                                <form th:action="@{/admin/users/{id}/delete(id=${u['id']})}"
                                      method="post" style="display:inline">
                                    <button type="submit" class="btn btn-sm btn-outline-danger"
                                            onclick="return confirm('Are you sure you want to delete this user?')">
                                        <i class="fas fa-trash"></i>
                                    </button>
                                </form>
                            </td>
                        </tr>
                    </tbody>
                </table>
                <div class="empty-state" th:if="${users == null or users.isEmpty()}">
                    <i class="fas fa-users-cog"></i>
                    <h5>No Users Found</h5>
                    <p>Get started by creating a new user.</p>
                </div>
            </div>

            <!-- Pagination -->
            <div class="card-footer" th:if="${totalPages != null and totalPages > 1}">
                <nav>
                    <ul class="pagination justify-content-center mb-0">
                        <li class="page-item" th:classappend="${currentPage == 0 ? 'disabled' : ''}">
                            <a class="page-link" th:href="@{/admin/users(page=${currentPage - 1})}">Previous</a>
                        </li>
                        <li class="page-item" th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                            th:classappend="${i == currentPage ? 'active' : ''}">
                            <a class="page-link" th:href="@{/admin/users(page=${i})}" th:text="${i + 1}">1</a>
                        </li>
                        <li class="page-item" th:classappend="${currentPage == totalPages - 1 ? 'disabled' : ''}">
                            <a class="page-link" th:href="@{/admin/users(page=${currentPage + 1})}">Next</a>
                        </li>
                    </ul>
                </nav>
            </div>
        </div>
    </div>
</body>
</html>
