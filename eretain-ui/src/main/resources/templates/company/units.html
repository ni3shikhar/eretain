<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main}">
<head><title>Units - eRetain</title></head>
<body>
    <div layout:fragment="content">
        <div class="page-header">
            <h2><i class="fas fa-sitemap me-2"></i>Units</h2>
            <a th:href="@{/company/units/new}" class="btn btn-primary">
                <i class="fas fa-plus me-1"></i>Add Unit
            </a>
        </div>

        <div class="card">
            <div class="card-body p-0">
                <table class="table table-hover" th:if="${units != null and !units.isEmpty()}">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Name</th>
                            <th>Code</th>
                            <th>Business Unit</th>
                            <th>Description</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="unit, iterStat : ${units}">
                            <td th:text="${iterStat.count}">1</td>
                            <td th:text="${unit['name']}">Development</td>
                            <td><span class="badge bg-secondary" th:text="${unit['code']}">DEV</span></td>
                            <td th:text="${unit['businessUnitName'] ?: unit['businessUnitId']}">Engineering</td>
                            <td th:text="${unit['description']}">Description</td>
                            <td class="action-btns">
                                <a th:href="@{/company/units/{id}/edit(id=${unit['id']})}"
                                   class="btn btn-sm btn-outline-primary" title="Edit">
                                    <i class="fas fa-edit"></i>
                                </a>
                                <form th:action="@{/company/units/{id}/delete(id=${unit['id']})}"
                                      method="post" style="display:inline">
                                    <button type="submit" class="btn btn-sm btn-outline-danger"
                                            data-confirm="Are you sure you want to delete this unit?">
                                        <i class="fas fa-trash"></i>
                                    </button>
                                </form>
                            </td>
                        </tr>
                    </tbody>
                </table>
                <div class="empty-state" th:if="${units == null or units.isEmpty()}">
                    <i class="fas fa-sitemap"></i>
                    <h5>No Units</h5>
                    <p>Create your first unit to get started.</p>
                    <a th:href="@{/company/units/new}" class="btn btn-primary">
                        <i class="fas fa-plus me-1"></i>Add Unit
                    </a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
