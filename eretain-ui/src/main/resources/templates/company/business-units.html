<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main}">
<head><title>Business Units - eRetain</title></head>
<body>
    <div layout:fragment="content">
        <div class="page-header">
            <h2><i class="fas fa-building me-2"></i>Business Units</h2>
            <a th:href="@{/company/business-units/new}" class="btn btn-primary">
                <i class="fas fa-plus me-1"></i>Add Business Unit
            </a>
        </div>

        <div class="card">
            <div class="card-body p-0">
                <table class="table table-hover" th:if="${businessUnits != null and !businessUnits.isEmpty()}">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Name</th>
                            <th>Code</th>
                            <th>Description</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="bu, iterStat : ${businessUnits}">
                            <td th:text="${iterStat.count}">1</td>
                            <td th:text="${bu['name']}">Engineering</td>
                            <td><span class="badge bg-secondary" th:text="${bu['code']}">ENG</span></td>
                            <td th:text="${bu['description']}">Description</td>
                            <td class="action-btns">
                                <a th:href="@{/company/business-units/{id}/edit(id=${bu['id']})}"
                                   class="btn btn-sm btn-outline-primary" title="Edit">
                                    <i class="fas fa-edit"></i>
                                </a>
                                <form th:action="@{/company/business-units/{id}/delete(id=${bu['id']})}"
                                      method="post" style="display:inline">
                                    <button type="submit" class="btn btn-sm btn-outline-danger"
                                            data-confirm="Are you sure you want to delete this business unit?">
                                        <i class="fas fa-trash"></i>
                                    </button>
                                </form>
                            </td>
                        </tr>
                    </tbody>
                </table>
                <div class="empty-state" th:if="${businessUnits == null or businessUnits.isEmpty()}">
                    <i class="fas fa-building"></i>
                    <h5>No Business Units</h5>
                    <p>Create your first business unit to get started.</p>
                    <a th:href="@{/company/business-units/new}" class="btn btn-primary">
                        <i class="fas fa-plus me-1"></i>Add Business Unit
                    </a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
