<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main}">
<head><title>Rate Cards - eRetain</title></head>
<body>
    <div layout:fragment="content">
        <div class="page-header">
            <h2><i class="fas fa-dollar-sign me-2"></i>Rate Cards</h2>
            <a th:href="@{/rate-cards/new}" class="btn btn-primary">
                <i class="fas fa-plus me-1"></i>New Rate Card
            </a>
        </div>

        <!-- Filter Bar -->
        <div class="filter-bar" th:if="${rateCards != null and !rateCards.isEmpty()}">
            <div class="row g-2">
                <div class="col-md-3">
                    <label>Role Name</label>
                    <input type="text" class="form-control" data-filter-col="1" placeholder="Search role name...">
                </div>
                <div class="col-md-2">
                    <label>Currency</label>
                    <input type="text" class="form-control" data-filter-col="5" placeholder="e.g. USD">
                </div>
                <div class="col-md-2 d-flex align-items-end gap-2">
                    <button type="button" class="btn btn-clear"><i class="fas fa-times me-1"></i>Clear</button>
                </div>
            </div>
            <div id="filter-count" class="filter-count"></div>
        </div>

        <div class="card">
            <div class="card-body p-0">
                <table class="table table-hover" th:if="${rateCards != null and !rateCards.isEmpty()}">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Role Name</th>
                            <th class="text-end">Audax Rate ($/hr)</th>
                            <th class="text-end">Fixed Fee Rate ($/hr)</th>
                            <th class="text-end">T&amp;M Rate ($/hr)</th>
                            <th>Currency</th>
                            <th>Description</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="rc, iterStat : ${rateCards}">
                            <td th:text="${iterStat.count}">1</td>
                            <td>
                                <strong th:text="${rc['roleName']}">Software Engineer</strong>
                            </td>
                            <td class="text-end">
                                <span class="badge bg-info-subtle text-info-emphasis fs-6" th:text="${#numbers.formatDecimal(rc['audaxRate'], 1, 2)}">75.00</span>
                            </td>
                            <td class="text-end">
                                <span class="badge bg-success-subtle text-success-emphasis fs-6" th:text="${#numbers.formatDecimal(rc['fixedFeeRate'], 1, 2)}">85.00</span>
                            </td>
                            <td class="text-end">
                                <span class="badge bg-warning-subtle text-warning-emphasis fs-6" th:text="${#numbers.formatDecimal(rc['tmRate'], 1, 2)}">95.00</span>
                            </td>
                            <td th:text="${rc['currency'] ?: 'USD'}">USD</td>
                            <td th:text="${rc['description'] ?: '-'}">Description</td>
                            <td class="action-btns">
                                <a th:href="@{/rate-cards/{id}(id=${rc['id']})}"
                                   class="btn btn-sm btn-outline-info" title="View">
                                    <i class="fas fa-eye"></i>
                                </a>
                                <a th:href="@{/rate-cards/{id}/edit(id=${rc['id']})}"
                                   class="btn btn-sm btn-outline-primary" title="Edit">
                                    <i class="fas fa-edit"></i>
                                </a>
                                <form th:action="@{/rate-cards/{id}/delete(id=${rc['id']})}"
                                      method="post" style="display:inline">
                                    <button type="submit" class="btn btn-sm btn-outline-danger"
                                            data-confirm="Are you sure you want to delete this rate card?">
                                        <i class="fas fa-trash"></i>
                                    </button>
                                </form>
                            </td>
                        </tr>
                    </tbody>
                </table>
                <div class="empty-state" th:if="${rateCards == null or rateCards.isEmpty()}">
                    <i class="fas fa-dollar-sign"></i>
                    <h5>No Rate Cards Found</h5>
                    <p>No role rate cards have been created yet.</p>
                    <a th:href="@{/rate-cards/new}" class="btn btn-primary mt-2">
                        <i class="fas fa-plus me-1"></i>Create First Rate Card
                    </a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
