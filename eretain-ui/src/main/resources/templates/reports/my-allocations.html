<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main}">
<head><title>My Allocations - eRetain</title></head>
<body>
    <div layout:fragment="content">
        <div class="page-header d-flex justify-content-between align-items-center">
            <h2><i class="fas fa-user-clock me-2"></i>My Allocations</h2>
            <a th:href="@{/reports}" class="btn btn-outline-secondary">
                <i class="fas fa-arrow-left me-1"></i>Back to Reports
            </a>
        </div>

        <!-- Summary -->
        <div class="row g-3 mb-4">
            <div class="col-md-4">
                <div class="stat-card stat-card-primary">
                    <div class="stat-icon"><i class="fas fa-tasks"></i></div>
                    <div class="stat-value" th:text="${reportData != null ? #lists.size(reportData) : 0}">0</div>
                    <div class="stat-label">Total Allocations</div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="stat-card stat-card-success">
                    <div class="stat-icon"><i class="fas fa-play-circle"></i></div>
                    <div class="stat-value" th:text="${activeCount ?: 0}">0</div>
                    <div class="stat-label">Active Allocations</div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="stat-card stat-card-info">
                    <div class="stat-icon"><i class="fas fa-clock"></i></div>
                    <div class="stat-value" th:text="${totalHoursPerDay ?: '0'}">0</div>
                    <div class="stat-label">Total Hrs/Day</div>
                </div>
            </div>
        </div>

        <!-- Allocations Table -->
        <div class="card">
            <div class="card-header">
                <h5 class="mb-0">My Project Allocations</h5>
            </div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead>
                            <tr>
                                <th>Project</th>
                                <th>Role</th>
                                <th>Hours/Day</th>
                                <th>Start Date</th>
                                <th>End Date</th>
                                <th>Status</th>
                                <th>Total Hours</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="alloc : ${reportData}" th:if="${reportData != null}">
                                <td th:text="${alloc['projectName']}">Project</td>
                                <td th:text="${alloc['roleName']}">Developer</td>
                                <td th:text="${alloc['hoursPerDay']}">8</td>
                                <td th:text="${alloc['startDate']}">2024-01-01</td>
                                <td th:text="${alloc['endDate']}">2024-12-31</td>
                                <td>
                                    <span class="badge" 
                                          th:classappend="'badge-' + ${alloc['allocationStatus']}"
                                          th:text="${alloc['allocationStatus']}">Active</span>
                                </td>
                                <td th:text="${alloc['totalAllocatedHours']}">0</td>
                            </tr>
                            <tr th:if="${reportData == null or #lists.isEmpty(reportData)}">
                                <td colspan="7" class="text-center text-muted">
                                    <i class="fas fa-info-circle me-1"></i>You have no allocations yet.
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
