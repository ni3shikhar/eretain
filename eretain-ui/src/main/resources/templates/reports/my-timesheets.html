<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main}">
<head><title>My Timesheets - eRetain</title></head>
<body>
    <div layout:fragment="content">
        <div class="page-header d-flex justify-content-between align-items-center">
            <h2><i class="fas fa-file-alt me-2"></i>My Timesheets</h2>
            <a th:href="@{/reports}" class="btn btn-outline-secondary">
                <i class="fas fa-arrow-left me-1"></i>Back to Reports
            </a>
        </div>

        <!-- Summary -->
        <div class="row g-3 mb-4">
            <div class="col-md-3">
                <div class="stat-card stat-card-primary">
                    <div class="stat-icon"><i class="fas fa-file-alt"></i></div>
                    <div class="stat-value" th:text="${reportData != null ? #lists.size(reportData) : 0}">0</div>
                    <div class="stat-label">Total Timesheets</div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="stat-card stat-card-success">
                    <div class="stat-icon"><i class="fas fa-check-circle"></i></div>
                    <div class="stat-value" th:text="${reportData != null ? reportData.?[#this['status'] == 'APPROVED'].size() : 0}">0</div>
                    <div class="stat-label">Approved</div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="stat-card stat-card-warning">
                    <div class="stat-icon"><i class="fas fa-paper-plane"></i></div>
                    <div class="stat-value" th:text="${reportData != null ? reportData.?[#this['status'] == 'SUBMITTED'].size() : 0}">0</div>
                    <div class="stat-label">Pending</div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="stat-card stat-card-info">
                    <div class="stat-icon"><i class="fas fa-hourglass-half"></i></div>
                    <div class="stat-value" th:text="${totalHours ?: '0'}">0</div>
                    <div class="stat-label">Total Hours</div>
                </div>
            </div>
        </div>

        <!-- Timesheets Table -->
        <div class="card">
            <div class="card-header">
                <h5 class="mb-0">My Timesheet History</h5>
            </div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead>
                            <tr>
                                <th>Week Starting</th>
                                <th>Week Ending</th>
                                <th>Total Hours</th>
                                <th>Status</th>
                                <th>Submitted On</th>
                                <th>Reviewed By</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="ts : ${reportData}" th:if="${reportData != null}">
                                <td th:text="${ts['weekStartDate']}">2024-01-01</td>
                                <td th:text="${ts['weekEndDate']}">2024-01-07</td>
                                <td th:text="${ts['totalHours']}">40</td>
                                <td>
                                    <span class="badge" 
                                          th:classappend="'badge-' + ${ts['status']}"
                                          th:text="${ts['status']}">Status</span>
                                </td>
                                <td th:text="${ts['submittedDate'] ?: '-'}">-</td>
                                <td th:text="${ts['approvedByName'] ?: '-'}">-</td>
                                <td>
                                    <a th:href="@{'/timesheets/' + ${ts['id']}}" 
                                       class="btn btn-sm btn-outline-primary">
                                        <i class="fas fa-eye"></i> View
                                    </a>
                                </td>
                            </tr>
                            <tr th:if="${reportData == null or #lists.isEmpty(reportData)}">
                                <td colspan="7" class="text-center text-muted">
                                    <i class="fas fa-info-circle me-1"></i>No timesheets found.
                                    <a th:href="@{/timesheets/new}" class="ms-2">Create your first timesheet</a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
