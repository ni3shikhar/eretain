<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layout/main}">
<head><title>Projects - eRetain</title></head>
<body>
    <div layout:fragment="content">
        <div class="page-header">
            <h2><i class="fas fa-project-diagram me-2"></i>Projects</h2>
            <div class="d-flex gap-2">
                <a th:href="@{/projects/bulk-upload}" class="btn btn-outline-primary" sec:authorize="hasAnyRole('ADMINISTRATOR','PMO')">
                    <i class="fas fa-file-upload me-1"></i>Bulk Upload
                </a>
                <a th:href="@{/projects/new}" class="btn btn-primary" sec:authorize="hasAnyRole('ADMINISTRATOR','PMO')">
                    <i class="fas fa-plus me-1"></i>New Project
                </a>
            </div>
        </div>

        <!-- Filter Bar -->
        <div class="filter-bar" th:if="${projects != null and !projects.isEmpty()}">
            <div class="row g-2">
                <div class="col-md-3">
                    <label>Project Name</label>
                    <input type="text" class="form-control" data-filter-col="1" placeholder="Search by name...">
                </div>
                <div class="col-md-2">
                    <label>Code</label>
                    <input type="text" class="form-control" data-filter-col="2" placeholder="Search code...">
                </div>
                <div class="col-md-2">
                    <label>Type</label>
                    <select class="form-select" data-filter-col="3">
                        <option value="">All Types</option>
                        <option value="FIXED_PRICE">FIXED_PRICE</option>
                        <option value="TIME_AND_MATERIAL">TIME_AND_MATERIAL</option>
                        <option value="INTERNAL">INTERNAL</option>
                        <option value="SUPPORT">SUPPORT</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <label>Status</label>
                    <select class="form-select" data-filter-col="4">
                        <option value="">All Statuses</option>
                        <option value="PROPOSED">PROPOSED</option>
                        <option value="ACTIVE">ACTIVE</option>
                        <option value="ON_HOLD">ON_HOLD</option>
                        <option value="COMPLETED">COMPLETED</option>
                        <option value="CANCELLED">CANCELLED</option>
                    </select>
                </div>
                <div class="col-md-3 d-flex align-items-end gap-2">
                    <button type="button" class="btn btn-clear"><i class="fas fa-times me-1"></i>Clear</button>
                </div>
            </div>
            <div id="filter-count" class="filter-count"></div>
        </div>

        <div class="card">
            <div class="card-body p-0">
                <table class="table table-hover" th:if="${projects != null and !projects.isEmpty()}">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Project Name</th>
                            <th>Code</th>
                            <th>Type</th>
                            <th>Status</th>
                            <th>Start Date</th>
                            <th>End Date</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="p, iterStat : ${projects}">
                            <td th:text="${currentPage * 10 + iterStat.count}">1</td>
                            <td>
                                <a th:href="@{/projects/{id}(id=${p['id']})}" th:text="${p['name'] != null ? p['name'] : p['projectName']}">Project Alpha</a>
                            </td>
                            <td><span class="badge bg-secondary" th:text="${p['projectCode']}">PA01</span></td>
                            <td th:text="${p['projectType']}">TIME_AND_MATERIAL</td>
                            <td>
                                <span class="badge-status"
                                      th:classappend="'badge-' + ${p['status']}"
                                      th:text="${p['status']}">ACTIVE</span>
                            </td>
                            <td th:text="${p['startDate']}">2024-01-01</td>
                            <td th:text="${p['endDate']}">2024-12-31</td>
                            <td class="action-btns">
                                <a th:href="@{/projects/{id}(id=${p['id']})}"
                                   class="btn btn-sm btn-outline-info" title="View">
                                    <i class="fas fa-eye"></i>
                                </a>
                                <span sec:authorize="hasAnyRole('ADMINISTRATOR','PMO')">
                                    <a th:href="@{/projects/{id}/edit(id=${p['id']})}"
                                       class="btn btn-sm btn-outline-primary" title="Edit">
                                        <i class="fas fa-edit"></i>
                                    </a>
                                    <form th:action="@{/projects/{id}/delete(id=${p['id']})}"
                                          method="post" style="display:inline">
                                        <button type="submit" class="btn btn-sm btn-outline-danger"
                                                data-confirm="Are you sure you want to delete this project?">
                                            <i class="fas fa-trash"></i>
                                        </button>
                                    </form>
                                </span>
                            </td>
                        </tr>
                    </tbody>
                </table>
                <div class="empty-state" th:if="${projects == null or projects.isEmpty()}">
                    <i class="fas fa-project-diagram"></i>
                    <h5>No Projects Found</h5>
                    <p>Get started by creating your first project.</p>
                </div>
            </div>

            <!-- Pagination -->
            <div class="card-footer" th:if="${totalPages != null and totalPages > 1}">
                <nav>
                    <ul class="pagination justify-content-center mb-0">
                        <li class="page-item" th:classappend="${currentPage == 0 ? 'disabled' : ''}">
                            <a class="page-link" th:href="@{/projects(page=${currentPage - 1})}">Previous</a>
                        </li>
                        <li class="page-item" th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                            th:classappend="${i == currentPage ? 'active' : ''}">
                            <a class="page-link" th:href="@{/projects(page=${i})}" th:text="${i + 1}">1</a>
                        </li>
                        <li class="page-item" th:classappend="${currentPage == totalPages - 1 ? 'disabled' : ''}">
                            <a class="page-link" th:href="@{/projects(page=${currentPage + 1})}">Next</a>
                        </li>
                    </ul>
                </nav>
            </div>
        </div>
    </div>
</body>
</html>
