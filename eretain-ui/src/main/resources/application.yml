server:
  port: 9000

spring:
  application:
    name: eretain-ui
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB
  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    cache: false
    encoding: UTF-8
    mode: HTML

eretain:
  api:
    gateway-url: ${ERETAIN_API_GATEWAY_URL:http://localhost:8080}
  jwt:
    secret: eRetainSecretKeyForJWTTokenGenerationMustBe256BitsLong!!

azure:
  openai:
    endpoint: ${AZURE_OPENAI_ENDPOINT:https://your-endpoint.openai.azure.com/}
    api-key: ${AZURE_OPENAI_API_KEY:your-api-key-here}
    deployment: ${AZURE_OPENAI_DEPLOYMENT:gpt-4o}
    api-version: ${AZURE_OPENAI_API_VERSION:2025-01-01-preview}

logging:
  level:
    com.eretain: DEBUG
